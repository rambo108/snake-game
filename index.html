<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #3C2A14;
            background-image:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 39px,
                    rgba(0, 0, 0, 0.1) 39px,
                    rgba(0, 0, 0, 0.1) 40px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 39px,
                    rgba(0, 0, 0, 0.1) 39px,
                    rgba(0, 0, 0, 0.1) 40px
                );
            font-family: 'Courier New', monospace;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            image-rendering: pixelated;
        }

        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #scoreBoard {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0px #3F3F3F;
            color: #FFFF55;
        }

        #canvasWrapper {
            position: relative;
            border: 4px solid #7F7F7F;
            box-shadow: inset 0 0 0 2px #555555, 0 0 0 4px #2D2D2D, 0 4px 16px rgba(0, 0, 0, 0.5);
        }

        #gameCanvas {
            display: block;
            background: #59422D;
            image-rendering: pixelated;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 12, 5, 0.90);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            text-align: center;
            padding: 20px;
        }

        #overlay.active {
            display: flex;
        }

        #overlay h1 {
            font-size: 42px;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-shadow: 3px 3px 0px #2A4F17;
            color: #5DA130;
        }

        #overlay h1.death {
            color: #AA0000;
            text-shadow: 3px 3px 0px #550000;
            font-size: 52px;
        }

        #overlay p {
            font-size: 18px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: #AAAAAA;
        }

        #overlay .score {
            font-size: 24px;
            margin: 20px 0;
            color: #FFFF55;
            letter-spacing: 2px;
        }

        #overlay .controls {
            font-size: 14px;
            margin-top: 20px;
            opacity: 0.7;
            color: #888888;
            letter-spacing: 1px;
        }

        #mobileControls {
            display: none;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            #mobileControls {
                display: grid;
            }
        }

        .controlBtn {
            background: linear-gradient(180deg, #8B8B8B 0%, #737373 40%, #595959 100%);
            border: 3px solid;
            border-color: #A0A0A0 #484848 #484848 #A0A0A0;
            border-radius: 0;
            color: #FFFFFF;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 2px 2px 0px #3F3F3F;
        }

        .controlBtn:active {
            background: linear-gradient(180deg, #6B6B6B 0%, #555555 40%, #434343 100%);
            border-color: #484848 #A0A0A0 #A0A0A0 #484848;
            transform: scale(0.97);
        }

        .controlBtn.up { grid-column: 2; grid-row: 1; }
        .controlBtn.left { grid-column: 1; grid-row: 2; }
        .controlBtn.down { grid-column: 2; grid-row: 2; }
        .controlBtn.right { grid-column: 3; grid-row: 2; }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="scoreBoard">
            <div>Score: <span id="score">0</span></div>
            <div>High Score: <span id="highScore">0</span></div>
        </div>
        
        <div id="canvasWrapper">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <div id="overlay">
                <h1 id="overlayTitle">MINECRAFT SNAKE</h1>
                <p id="overlayMessage">Press ENTER to Play</p>
                <div class="score" id="overlayScore"></div>
                <p class="controls pulse">Arrow Keys or WASD to Move | Space to Pause</p>
            </div>
        </div>

        <div id="mobileControls">
            <button class="controlBtn up" data-direction="up">▲</button>
            <button class="controlBtn left" data-direction="left">◀</button>
            <button class="controlBtn down" data-direction="down">▼</button>
            <button class="controlBtn right" data-direction="right">▶</button>
        </div>
    </div>

    <script>
        // Game constants
        const GRID_SIZE = 20;
        const CELL_SIZE = 30;
        const INITIAL_SPEED = 150;
        const SPEED_INCREASE = 10;
        const SPEED_INTERVAL = 5;
        const INITIAL_LENGTH = 3;

        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = GRID_SIZE * CELL_SIZE;
        canvas.height = GRID_SIZE * CELL_SIZE;

        // DOM elements
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayMessage = document.getElementById('overlayMessage');
        const overlayScore = document.getElementById('overlayScore');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');

        // Game state
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
        let gameLoop = null;
        let gameSpeed = INITIAL_SPEED;
        let foodCount = 0;
        let gameState = 'start'; // start, playing, paused, gameOver
        let audioContext = null;

        // Initialize high score display
        highScoreDisplay.textContent = highScore;

        // Initialize snake at center
        function initSnake() {
            const centerX = Math.floor(GRID_SIZE / 2);
            const centerY = Math.floor(GRID_SIZE / 2);
            snake = [];
            for (let i = INITIAL_LENGTH - 1; i >= 0; i--) {
                snake.push({ x: centerX - i, y: centerY });
            }
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
        }

        // Place food at random empty cell
        function placeFood() {
            let validPosition = false;
            while (!validPosition) {
                food.x = Math.floor(Math.random() * GRID_SIZE);
                food.y = Math.floor(Math.random() * GRID_SIZE);
                validPosition = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        // Draw stone-gray grid lines
        function drawGrid() {
            ctx.strokeStyle = 'rgba(150, 130, 100, 0.15)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
        }

        // Draw Creeper-styled snake with pixel-art blocks
        function drawSnake() {
            snake.forEach((segment, index) => {
                const x = segment.x * CELL_SIZE;
                const y = segment.y * CELL_SIZE;
                const isHead = index === snake.length - 1;

                // Gradient from darker tail to brighter head
                const t = index / Math.max(snake.length - 1, 1);
                const r = Math.floor(55 + t * 38);
                const g = Math.floor(110 + t * 51);
                const b = Math.floor(25 + t * 23);

                // Main block fill
                ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
                ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);

                // 3D block edges - top/left highlight, bottom/right shadow
                ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
                ctx.fillRect(x, y, CELL_SIZE, 2);
                ctx.fillRect(x, y, 2, CELL_SIZE);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
                ctx.fillRect(x + CELL_SIZE - 2, y, 2, CELL_SIZE);
                ctx.fillRect(x, y + CELL_SIZE - 2, CELL_SIZE, 2);

                // Creeper face on head
                if (isHead) {
                    ctx.fillStyle = '#5DA130';
                    ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, 2);
                    ctx.fillRect(x + 2, y + 2, 2, CELL_SIZE - 4);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                    ctx.fillRect(x + CELL_SIZE - 4, y + 2, 2, CELL_SIZE - 4);
                    ctx.fillRect(x + 2, y + CELL_SIZE - 4, CELL_SIZE - 4, 2);

                    // Creeper face pixels (5x5 grid, 6px each)
                    var px = 6;
                    ctx.fillStyle = '#1E3A10';
                    // Eyes
                    ctx.fillRect(x + px, y + px, px, px);
                    ctx.fillRect(x + 3 * px, y + px, px, px);
                    // Nose bridge
                    ctx.fillRect(x + 2 * px, y + 2 * px, px, px);
                    // Mouth
                    ctx.fillRect(x + px, y + 3 * px, px, px);
                    ctx.fillRect(x + 2 * px, y + 3 * px, px, px);
                    ctx.fillRect(x + 3 * px, y + 3 * px, px, px);
                    // Mouth bottom
                    ctx.fillRect(x + px, y + 4 * px, px, px);
                    ctx.fillRect(x + 3 * px, y + 4 * px, px, px);
                }
            });
        }

        // Draw Minecraft apple food item
        function drawFood() {
            const x = food.x * CELL_SIZE;
            const y = food.y * CELL_SIZE;
            const pulse = Math.sin(Date.now() / 300) * 0.12 + 0.88;

            ctx.globalAlpha = pulse;

            // Apple body
            ctx.fillStyle = '#CC2222';
            ctx.fillRect(x + 4, y + 9, 22, 17);

            // Highlight
            ctx.fillStyle = '#EE4444';
            ctx.fillRect(x + 6, y + 11, 8, 6);

            // Shadow
            ctx.fillStyle = '#881111';
            ctx.fillRect(x + 16, y + 17, 8, 7);

            // 3D edges
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.fillRect(x + 4, y + 9, 22, 2);
            ctx.fillRect(x + 4, y + 9, 2, 17);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
            ctx.fillRect(x + 24, y + 9, 2, 17);
            ctx.fillRect(x + 4, y + 24, 22, 2);

            // Stem
            ctx.fillStyle = '#5C3A1E';
            ctx.fillRect(x + 13, y + 2, 4, 9);

            // Leaf
            ctx.fillStyle = '#4A8C2A';
            ctx.fillRect(x + 17, y + 4, 6, 3);
            ctx.fillRect(x + 21, y + 3, 3, 2);

            ctx.globalAlpha = 1.0;
        }

        // Render game with dirt background
        function render() {
            ctx.fillStyle = '#59422D';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Subtle dirt texture variation per cell
            for (let gx = 0; gx < GRID_SIZE; gx++) {
                for (let gy = 0; gy < GRID_SIZE; gy++) {
                    const v = ((gx * 7 + gy * 13 + gx * gy) % 7);
                    if (v < 3) {
                        ctx.fillStyle = 'rgba(0, 0, 0, ' + (0.03 + v * 0.012) + ')';
                        ctx.fillRect(gx * CELL_SIZE, gy * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    }
                }
            }
            drawGrid();
            drawFood();
            drawSnake();
        }

        // Minecraft-style pickup sound using Web Audio API
        function playCrunchSound() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 0.06);
            oscillator.frequency.exponentialRampToValueAtTime(600, audioContext.currentTime + 0.12);
            
            gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.12);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.12);
        }

        // Update game state
        function update() {
            // Update direction
            direction = { ...nextDirection };

            // Calculate new head position
            const head = snake[snake.length - 1];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };

            // Check wall collision
            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            // Check self collision
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                gameOver();
                return;
            }

            // Add new head
            snake.push(newHead);

            // Check food collision
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                foodCount++;
                scoreDisplay.textContent = score;
                playCrunchSound();
                placeFood();
                
                // Increase speed every 5 food items
                if (foodCount % SPEED_INTERVAL === 0) {
                    clearInterval(gameLoop);
                    gameSpeed = Math.max(50, gameSpeed - SPEED_INCREASE);
                    gameLoop = setInterval(gameUpdate, gameSpeed);
                }
                
                // Update high score
                if (score > highScore) {
                    highScore = score;
                    highScoreDisplay.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
            } else {
                // Remove tail if no food eaten
                snake.shift();
            }
        }

        // Main game loop
        function gameUpdate() {
            if (gameState === 'playing') {
                update();
                render();
            }
        }

        // Start game
        function startGame() {
            score = 0;
            foodCount = 0;
            gameSpeed = INITIAL_SPEED;
            scoreDisplay.textContent = score;
            initSnake();
            placeFood();
            gameState = 'playing';
            overlay.classList.remove('active');
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameUpdate, gameSpeed);
            render();
        }

        // Pause game - Minecraft menu style
        function pauseGame() {
            if (gameState === 'playing') {
                gameState = 'paused';
                overlayTitle.textContent = 'Game Paused';
                overlayTitle.className = '';
                overlayMessage.textContent = 'Press SPACE to Resume';
                overlayScore.textContent = '';
                overlay.classList.add('active');
            } else if (gameState === 'paused') {
                gameState = 'playing';
                overlay.classList.remove('active');
            }
        }

        // Game over - Minecraft death screen
        function gameOver() {
            gameState = 'gameOver';
            clearInterval(gameLoop);
            overlayTitle.textContent = 'You Died!';
            overlayTitle.className = 'death';
            overlayMessage.textContent = 'Press ENTER to Respawn';
            overlayScore.textContent = 'Score: ' + score;
            overlay.classList.add('active');
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            // Prevent default for game keys
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd', ' ', 'Enter'].includes(e.key)) {
                e.preventDefault();
            }

            if (gameState === 'start' || gameState === 'gameOver') {
                if (e.key === 'Enter') {
                    startGame();
                }
                return;
            }

            if (e.key === ' ') {
                pauseGame();
                return;
            }

            if (gameState !== 'playing') return;

            // Direction controls with 180-degree prevention
            let newDirection = { ...nextDirection };
            
            if ((e.key === 'ArrowUp' || e.key === 'w') && direction.y === 0) {
                newDirection = { x: 0, y: -1 };
            } else if ((e.key === 'ArrowDown' || e.key === 's') && direction.y === 0) {
                newDirection = { x: 0, y: 1 };
            } else if ((e.key === 'ArrowLeft' || e.key === 'a') && direction.x === 0) {
                newDirection = { x: -1, y: 0 };
            } else if ((e.key === 'ArrowRight' || e.key === 'd') && direction.x === 0) {
                newDirection = { x: 1, y: 0 };
            }
            
            nextDirection = newDirection;
        });

        // Mobile controls
        document.querySelectorAll('.controlBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (gameState !== 'playing') return;

                const dir = btn.dataset.direction;
                let newDirection = { ...nextDirection };

                if (dir === 'up' && direction.y === 0) {
                    newDirection = { x: 0, y: -1 };
                } else if (dir === 'down' && direction.y === 0) {
                    newDirection = { x: 0, y: 1 };
                } else if (dir === 'left' && direction.x === 0) {
                    newDirection = { x: -1, y: 0 };
                } else if (dir === 'right' && direction.x === 0) {
                    newDirection = { x: 1, y: 0 };
                }

                nextDirection = newDirection;
            });
        });

        // Initialize game
        initSnake();
        placeFood();
        render();
        overlay.classList.add('active');
    </script>
</body>
</html>
